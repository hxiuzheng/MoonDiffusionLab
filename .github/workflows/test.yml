name: OSC2026 MoonBit CI

on:
  push:
  pull_request:

jobs:
  build:
    name: MoonBit CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install MoonBit (Linux/macOS)
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: MoonBit version
        run: moon version --all

      - name: Update toolchain and registry
        run: moon update

      - name: moon check
        run: moon check --target all

      - name: moon fmt --deny-warn
        run: moon fmt --deny-warn

      - name: moon info --deny-warn
        run: moon info --deny-warn

      - name: moontest
        run: moon test --target all
